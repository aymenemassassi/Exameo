global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: exameo-dev
    environment: dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          source: otel

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:8080"]

  - job_name: spring-actuator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "api-gateway:8080"
          - "user-service:8082"
        labels:
          source: spring-boot
